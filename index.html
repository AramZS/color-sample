<!DOCTYPE html>
<html lang="en" class="theme-alfalfa">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pen</title>
  </head>
  <body class="background">

    <script src="./script.js"></script>
    <aside class="theme-picker background">
        <h1 class="foreground-text">Theme Picker</h1>
        <nav>
          <ul>
                  <li class="theme-one current">
                      <button class="theme-selector-btn" data-theme="one">
                          <span>1</span>
                          <span class="swatches">
                              <span class="background"></span>
                              <span class="background-muted"></span>
                              <span class="foreground"></span>
                              <span class="foreground-muted"></span>
                              <span class="accent"></span>
                          </span>
                      </button>
                  </li>
                  <li class="theme-two">
                      <button class="theme-selector-btn" data-theme="two">
                          <span>2</span>
                          <span class="swatches">
                              <span class="background"></span>
                              <span class="background-muted"></span>
                              <span class="foreground"></span>
                              <span class="foreground-muted"></span>
                              <span class="accent"></span>
                          </span>
                      </button>
                  </li>
                  <li class="theme-three">
                      <button class="theme-selector-btn" data-theme="three">
                          <span>3</span>
                          <span class="swatches">
                              <span class="background"></span>
                              <span class="background-muted"></span>
                              <span class="foreground"></span>
                              <span class="foreground-muted"></span>
                              <span class="accent"></span>
                          </span>
                      </button>
                  </li>        
<li class="theme-four">
                      <button class="theme-selector-btn" data-theme="four">
                          <span>4</span>
                          <span class="swatches">
                              <span class="background"></span>
                              <span class="background-muted"></span>
                              <span class="foreground"></span>
                              <span class="foreground-muted"></span>
                              <span class="accent"></span>
                          </span>
                      </button>
                  </li>   
            <li class="theme-five">
                      <button class="theme-selector-btn" data-theme="five">
                          <span>5</span>
                          <span class="swatches">
                              <span class="background"></span>
                              <span class="background-muted"></span>
                              <span class="foreground"></span>
                              <span class="foreground-muted"></span>
                              <span class="accent"></span>
                          </span>
                      </button>
                  </li>
          </ul>
        </nav>
    </aside>
    <article class="background-muted">
      <section class="container background-muted">
        <div class="color-el-display accent">
          <div class="color-el-display-samples">
            <div class="color-el one"></div>
            <div class="color-el two"></div>
            <div class="color-el three"></div>
            <div class="color-el four"></div>
          </div>
          <div class="image-container">
            <img src="https://raw.githubusercontent.com/AramZS/aramzs.github.io/refs/heads/master/_includes/ALFALFA%20color%20pallete.jpg">
          </div>
          <div class="image-container">
            <img src="https://raw.githubusercontent.com/AramZS/aramzs.github.io/refs/heads/master/_includes/ALFALFA-SPLITSCREEN-COVER.jpeg">
          </div>          
        </div>
        <section class="textbox foreground">
          <h4 class="accent-text">Aa Bb Cc Dd Ee Ff</h4>
          <p class="accent-text">Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam nonumy eirmod tempor invidunt ut labore et.</p>
        </section>
        <section class="spacer"></section>
        <section class="button-container">
          <button class="background foreground-text">Click here</button>
          <button class="foreground-muted background-muted-text">Click here</button>
        </section>
      </section>
    </article>
  </body>
</html>
